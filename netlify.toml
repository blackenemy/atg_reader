[build]
  command = "pip install -r requirements.txt && mkdir -p public && cp -r templates/* public/ 2>/dev/null; cp -r static/* public/ 2>/dev/null; true"
  functions = "netlify/functions"
  publish = "public"

[build.environment]
  PYTHON_VERSION = "3.11"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api"
  status = 200
