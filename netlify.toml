# Against the Gods Reader — Netlify static deployment
#
# ❗ Before deploying: run generate_static.py locally first
#    python generate_static.py
#    git add index.html info.json index-data.json api-unavailable.json chapters/
#    git push
#
# TTS and Bookmark persistence require a Python server — NOT available on Netlify.
# The app automatically detects static mode and disables those features gracefully.

[build]
  publish = "."
  # Static files are pre-generated locally — nothing to build on Netlify CI
  command = "echo 'Static files pre-generated. Run generate_static.py locally to update.'"

# ── API rewrites: map /api/* paths to pre-generated static JSON files ──
# status = 200 → transparent rewrite (browser URL stays the same)

[[redirects]]
  from   = "/api/chapter/*"
  to     = "/chapters/:splat.json"
  status = 200

[[redirects]]
  from   = "/api/info"
  to     = "/info.json"
  status = 200

[[redirects]]
  from   = "/api/index"
  to     = "/index-data.json"
  status = 200

# Bookmark + TTS need Python server → return generic unavailable JSON
# JS handles these failures gracefully (bookmark → localStorage, TTS → disabled)
[[redirects]]
  from   = "/api/bookmark"
  to     = "/api-unavailable.json"
  status = 200

[[redirects]]
  from   = "/api/tts/*"
  to     = "/api-unavailable.json"
  status = 200

# SPA fallback: any unknown path → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
